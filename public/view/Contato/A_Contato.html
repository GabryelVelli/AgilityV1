<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Contato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>

<body>
      <div id="topbar-container"></div>

          <div id="sidebar-container"></div>

      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr>
        <h2><i class="fa-solid fa-envelope"></i>Entre em Contato</h2>
        <p class="texto-produto" style="margin-bottom: 30px;">Preencha o formulário abaixo e nossa equipe entrará em contato o mais breve possível.</p>
        <div class ="card-container">
        <div class="form-card">
          <!-- <form id="contact-form" action="/send-email" method="POST"> -->
            <form id="contact-form" action="https://formsubmit.co/gabryel.velli@gmail.com" method="POST">
                <input type="hidden" name="_subject" value="Novo contato - AGILITY">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="http://localhost:8080/view/Contato/A_Contato.html?enviado=1">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
                
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="assunto">Assunto:</label>
                <input type="text" id="assunto" name="assunto" required>
                
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="4" required></textarea>
                
                <div class="buttons-container">
                    <button type="submit" class="send-btn">Enviar</button>
                    <button type="reset" class="clear-btn">Limpar</button>
                </div>
            </form>
        </div>
        </div>
    </main>
    <div id="modalExclusao" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="mensagemModal"></p>
        </div>
    </div>
</body>
<script src="/Mixins/topbar.js"></script>
    <script src="/Mixins/sidebar.js"></script>
    <script src="/js/Auth/scriptinicio.js"></script>
<script src="/js/Contato/A_Contato.js"></script>
 <script src="/js/Perfil/A_Perfil.js"></script>
 <script src="/js/Notificacao/A_Notificacao.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</html>
