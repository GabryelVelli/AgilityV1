<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Cadastrar Produtos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/inicio.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>

<body>
      <header class="top-bar">
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <h1 style="letter-spacing: 5px;">AGILITY</h1>
        <div class="placeholder"></div>
           <div class="top-bar-right">
            <!-- Notificações -->
             <div class="notification-icon" id="notificacao-btn" style="cursor: pointer;">
                <span class="bell">🔔</span>
                <span class="notification-badge" id="notificacao-contador" style="display: none;">0</span>
            </div>

            <!-- Área do usuário -->
            <div class="user-info">
              <img id="avatarUsuario" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Usuário" class="user-avatar">
              <span class="user-name">Olá, Usuário</span>
            </div>
          </div> 
      </header>

          <div id="sidebar-container"></div>


    <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr> 
        <h2><i class="fa-solid fa-box"></i> Cadastro de Produto</h2>
        
        <p class="texto-produto">Cadastre Seus Produtos Aqui.</p>
        <p class="texto-produto">Após Cadastrar os produtos estarão disponiveis nos seus Registros.</p>

        <div class="card-container">
          <div class="form-card">
            <form id="produto-form">
              <div class="form-row">
                <div class="form-field">
                  <label for="nome">Nome do Produto:</label>
                  <input type="text" id="nome" name="nome" placeholder="Ex: Coca-Cola 2L" required>
                </div>
                <div class="form-field">
                  <label for="codigoBarras">Código de Barras:</label>
                  <input type="text" id="codigoBarras" name="codigoBarras" placeholder="7891234567890" required maxlength="13">
                </div>
              </div>

              <div class="form-row">
                <div class="form-field">
                  <label for="vencimento">Vencimento:</label>
                  <input type="date" id="vencimento" name="vencimento" required>
                </div>
                <div class="form-field">
                  <label for="quantidade">Quantidade:</label>
                  <input type="number" id="quantidade" name="quantidade" min="1" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-field">
                  <label for="fornecedor">Fornecedor:</label>
                  <input type="text" id="fornecedor" name="fornecedor" placeholder="Ex: Coca-Cola Brasil">
                </div>
                <div class="form-field">
                  <label for="categoria">Categoria:</label>
                  <input type="text" id="categoria" name="categoria" placeholder="Ex: Bebida" required>
                </div>
              </div>

              <div class="button-container">
                <button type="submit" class="button">Cadastrar</button>
              </div>
            </form>
          </div>
        </div>
            <!-- Modal -->
            <div id="modalExclusao" class="modal">
                <div class="modal-content">
                    <p class="close">&times;</p>
                    <p id="mensagemModal"></p>
                </div>
            </div>
        </div>

        <div id="produtosContainer"></div>

    </main>
</body>

<script src="../js/A_CadastroProduto.js"></script>
<script src="../js/sidebar.js"></script>
    <script src="../js/scriptinicio.js"></script>
<script src="../js/A_Notificacao.js"></script>
<script src="../js/A_Perfil.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        atualizarContadorNotificacoes();
      });
    </script>

</html>
