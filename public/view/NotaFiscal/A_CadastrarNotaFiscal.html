!<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Cadastrar Nota Fiscal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
      <div id="topbar-container"></div>

        <div id="sidebar-container"></div>

      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr> 
        <h2><i class="fa-solid fa-plus"></i class="texto-produto">Cadastrar Itens</h2>
        <p class="texto-produto">Cadastre a Nota Fiscal</p>
        <p class="texto-produto">Após Cadastrar os itens eles estarão na aba Nota fiscal.</p>

        
    <div class="card-container">
      <div class="form-card">
        <form id="nota-form">
          <div class="form-row">
            <div class="form-field">
              <label for="numero">Número da Nota:</label>
              <input type="text" id="numero" name="numero" placeholder="Ex: NF1234" required>
            </div>
            <div class="form-field">
              <label for="serie">Série:</label>
              <input type="text" id="serie" name="serie" placeholder="1">
            </div>
          </div>

          <div class="form-row">
            <div class="form-field">
              <label for="data_emissao">Data de Emissão:</label>
              <input type="date" id="data_emissao" name="data_emissao" required>
            </div>
            <div class="form-field">
              <label for="valor_total">Valor Total:</label>
              <input type="number" id="valor_total" name="valor_total" step="0.01" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-field">
              <label for="fornecedor">Fornecedor:</label>
              <input type="text" id="fornecedor" name="fornecedor" placeholder="Fornecedor X">
            </div>
          </div>

          <div class="button-container">
            <button type="submit" class="button">Cadastrar</button>
          </div>
        </form>
      </div>
    </div>



              <!-- Modal -->
            <div id="modalExclusao" class="modal">
                <div class="modal-content">
                    <p class="close">&times;</p>
                    <p id="mensagemModal"></p>
                </div>
            </div>
          </div>
  
      </main>
    <script src="/Mixins/topbar.js"></script>
    <script src="/Mixins/sidebar.js"></script>
    <script src="/js/Auth/scriptinicio.js"></script>
    <script src="/js/NotaFiscal/A_CadastrarNotaFiscal.js"></script>
    <script src="/js/Notificacao/A_Notificacao.js"></script>
    <script src="/js/Perfil/A_Perfil.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</body>
</html>
