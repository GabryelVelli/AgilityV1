<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/inicio.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
 <header class="top-bar">
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <h1 style="letter-spacing: 5px;">AGILITY</h1>
        <div class="placeholder"></div>
           <div class="top-bar-right">
            <!-- Notificações -->
            <div class="notification-icon" id="notificacao-btn" style="cursor: pointer;">
                <span class="bell">🔔</span>
                <span class="notification-badge" id="notificacao-contador" style="display: none;">0</span>
            </div>

            <!-- Área do usuário -->
         <div class="user-info">
            <img id="avatarUsuario" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Usuário" class="user-avatar">
            <span class="user-name">Olá, Usuário</span>
          </div>
          </div> 
      </header>

        <div id="sidebar-container"></div>

      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i> AGILITY</h1>
        <hr>
        <h2><i class="fa-solid fa-circle-user"></i>Perfil</h2>
         <div class="perfil-container">

         <!-- Avatar principal -->
          <img id="avatarSelecionado" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Usuário" class="user-avatar">

          <!-- Avatares para escolher -->
          <div class="avatar-container">
           <img class="avatar" data-id="1" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Avatar 1" width="40">
          <img class="avatar" data-id="2" src="https://i.pinimg.com/564x/5b/50/e7/5b50e75d07c726d36f397f6359098f58.jpg" alt="Avatar 2" width="40">
          <img class="avatar" data-id="3" src="https://wallpapers.com/images/hd/netflix-profile-pictures-5yup5hd2i60x7ew3.jpg" alt="Avatar 3" width="40">
          <img class="avatar" data-id="4" src="https://loodibee.com/wp-content/uploads/Netflix-avatar-7.png" alt="Avatar 4" width="40">

            <!-- Adicione mais se quiser -->
          </div>

          <!-- Informações do usuário -->
          <form id="alterarEmailForm" class="formulario">
            
            <div class="user-info-perfil" >
            <label class="label-perfil">Email Atual</label>
            <input class="user-info-perfil"  type="email" id="emailAtual" placeholder="E-mail atual" required />
            </div>
            <div class="user-info-perfil" >
            <label class="label-perfil">Email Novo</label>
            <input class="user-info-perfil"  type="email" id="novoEmail" placeholder="Novo e-mail" required />
            </div>
            <button class="botao-perfil" type="submit">Alterar E-mail</button>
          </form>
          <br><br>
          <!-- Notificações -->
           <div class="notificacao-config">
              <label>
                <input type="checkbox" id="toggleNotificacoes">
                Desejo receber notificações
              </label>
            </div>

          <!-- Botões -->
          <button class="botao-perfil" id="btnAlterarEmail" onclick="salvarPerfil()">Salvar Alterações</button>
        </div>
        <div id="modalExclusao" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="mensagemModal"></p>
        </div>
    </div>
      </main>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../js/sidebar.js"></script>
    <script src="../js/scriptinicio.js"></script>
    <script src="../js/A_Perfil.js"></script>
     <script src="../js/A_Notificacao.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
    </script>
</body>
</html>
