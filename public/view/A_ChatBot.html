<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - ChatBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/inicio.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  
</head>
<body>
    <header class="top-bar">
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <h1 style="letter-spacing: 5px;">AGILITY</h1>
        <div class="placeholder"></div>
           <div class="top-bar-right">
            <!-- Notificações -->
             <div class="notification-icon" id="notificacao-btn" style="cursor: pointer;">
                <span class="bell">🔔</span>
                <span class="notification-badge" id="notificacao-contador" style="display: none;">0</span>
            </div>

            <!-- Área do usuário -->
              <div class="user-info">
                <img id="avatarUsuario" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Usuário" class="user-avatar">
                <span class="user-name">Olá, Usuário</span>
              </div>
          </div> 
      </header>

        <div id="sidebar-container"></div>

      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i> AGILITY</h1>
        <hr>
        <h2><i class="fa-solid fa-headset"></i>ChatBot</h2>
        <p class="texto-produto">Fale com um chatbot para tirar duvidas</p>

             <div class="perfil-container">
                <div id="chat"></div>
                <div id="input-area">
                    <input type="text" id="input" placeholder="Digite sua mensagem..." autocomplete="off" />
                    <button id="send-btn">Enviar</button>
                </div>
            </div>
   
    </main>   
    <script src="../js/sidebar.js"></script>
    <script src="../js/scriptinicio.js"></script>
    <script src="../js/A_Chatbot.js"></script>
    <script src="../js/A_Notificacao.js"></script>
     <script src="../js/A_Perfil.js"></script>

 <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</body>
</html>
