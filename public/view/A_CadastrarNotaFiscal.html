!<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Cadastrar Nota Fiscal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/inicio.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
      <header class="top-bar">
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <h1 style="letter-spacing: 5px;">AGILITY</h1>
        <div class="placeholder"></div>
           <div class="top-bar-right">
            <!-- Notificações -->
            <div class="notification-icon" id="notificacao-btn" style="cursor: pointer;">
                <span class="bell">🔔</span>
                <span class="notification-badge" id="notificacao-contador" style="display: none;">0</span>
            </div>

            <!-- Área do usuário -->
               <div class="user-info">
                  <img id="avatarUsuario" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Usuário" class="user-avatar">
                  <span class="user-name">Olá, Usuário</span>
                </div>
          </div> 
      </header>

        <div id="sidebar-container"></div>

      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr> 
        <h2><i class="fa-solid fa-plus"></i class="texto-produto">Cadastrar Itens</h2>
        <p class="texto-produto">Cadastre a Nota Fiscal</p>
        <p class="texto-produto">Apos Cadastrar os itens eles estarão na aba Nota fiscal.</p>

        
    <div class="card-container">
      <div class="form-card">
        <form id="nota-form">
          <div class="form-row">
            <div class="form-field">
              <label for="numero">Número da Nota:</label>
              <input type="text" id="numero" name="numero" placeholder="Ex: NF1234" required>
            </div>
            <div class="form-field">
              <label for="serie">Série:</label>
              <input type="text" id="serie" name="serie" placeholder="1">
            </div>
          </div>

          <div class="form-row">
            <div class="form-field">
              <label for="data_emissao">Data de Emissão:</label>
              <input type="date" id="data_emissao" name="data_emissao" required>
            </div>
            <div class="form-field">
              <label for="valor_total">Valor Total:</label>
              <input type="number" id="valor_total" name="valor_total" step="0.01" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-field">
              <label for="fornecedor">Fornecedor:</label>
              <input type="text" id="fornecedor" name="fornecedor" placeholder="Fornecedor X">
            </div>
          </div>

          <div class="button-container">
            <button type="submit" class="button">Cadastrar</button>
          </div>
        </form>
      </div>
    </div>



              <!-- Modal -->
            <div id="modalExclusao" class="modal">
                <div class="modal-content">
                    <p class="close">&times;</p>
                    <p id="mensagemModal"></p>
                </div>
            </div>
          </div>
  
      </main>
    <script src="../js/sidebar.js"></script>
    <script src="../js/scriptinicio.js"></script>
    <script src="../js/A_CadastrarNotaFiscal.js"></script>
    <script src="../js/A_Notificacao.js"></script>
    <script src="../js/A_Perfil.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</body>
</html>
