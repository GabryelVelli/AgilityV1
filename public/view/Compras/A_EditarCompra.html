!<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Editar Compra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
      <header class="top-bar">
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <h1 style="letter-spacing: 5px;">AGILITY</h1>
        <div class="placeholder"></div>
           <div class="top-bar-right">
            <!-- Notificações -->
           <div class="notification-icon" id="notificacao-btn" style="cursor: pointer;">
                <span class="bell">🔔</span>
                <span class="notification-badge" id="notificacao-contador" style="display: none;">0</span>
            </div>

            <!-- Área do usuário -->
                <div class="user-info">
                  <img id="avatarUsuario" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Usuário" class="user-avatar">
                  <span class="user-name">Olá, Usuário</span>
                </div>
          </div> 
      </header>

        <div id="sidebar-container"></div>

      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr> 
        <h2><i class="fa-solid fa-plus"></i class="texto-produto">Cadastrar Itens</h2>
        <p class="texto-produto">Cadastre Produtos para Compra Aqui.</p>
        <p class="texto-produto">Apos Cadastrar os itens eles estarão no Compras.</p>

        <h2>Editar Compra</h2>
      
      <div class="card-container">
       <div class="form-card">
        <form id="editar-compra-form">
            <div class="form-row">
            <div class="form-field">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required />
            </div>
            <div class="form-field">
                <label for="valor">Valor:</label>
                <input type="number" step="0.01" id="valor" name="valor" required />
            </div>
            <div class="form-field">
                <label for="quantidade">Quantidade:</label>
                <input type="number" id="quantidade" name="quantidade" required />
            </div>
            </div>

            <div class="form-row">
            <div class="form-field">
                <label for="prioridade">Prioridade:</label>
                <input type="text" id="prioridade" name="prioridade" required />
            </div>
            <div class="form-field">
                <label for="categoria">Categoria:</label>
                <input type="text" id="categoria" name="categoria" required />
            </div>
            </div>

            <div class="button-container">
            <button type="submit" class="button">Salvar Alterações</button>
            </div>
        </form>
      </div>
    </div>

              <!-- Modal -->
            <div id="modalExclusao" class="modal">
                <div class="modal-content">
                    <p class="close">&times;</p>
                    <p id="mensagemModal"></p>
                </div>
            </div>
          </div>
  
      </main>
    <script src="/Mixins/sidebar.js"></script>
    <script src="/js/Auth/scriptinicio.js"></script>
    <script src="/js/Compras/A_EditarCompra.js"></script>
     <script src="/js/Notificacao/A_Notificacao.js"></script>
      <script src="/js/Perfil/A_Perfil.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</body>
</html>
