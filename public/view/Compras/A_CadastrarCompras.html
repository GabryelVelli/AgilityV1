!<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Cadastrar Compras</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
       <div id="topbar-container"></div>

        <div id="sidebar-container"></div>

      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr> 
        <h2><i class="fa-solid fa-plus"></i class="texto-produto">Cadastrar Compras</h2>
        <p class="texto-produto">Cadastre Produtos para Compra Aqui.</p>

       <div class="card-container">
        <div class="form-card">
          <form id="compra-form">
            <div class="form-row">
              <div class="form-field">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required />
              </div>
              <div class="form-field">
                <label for="valor">Valor:</label>
                <input type="number" step="0.01" id="valor" name="valor" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <label for="quantidade">Quantidade:</label>
                <input type="number" id="quantidade" name="quantidade" required />
              </div>
              <div class="form-field">
                <label for="prioridade">Prioridade:</label>
                <input type="text" id="prioridade" name="prioridade" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <label for="categoria">Categoria:</label>
                <input type="text" id="categoria" name="categoria" required />
              </div>
            </div>

            <div class="button-container">
              <button type="submit" class="button">Cadastrar Item</button>
            </div>
          </form>
        </div>
      </div>
              <!-- Modal -->
              <div id="modalExclusao" class="modal">
                  <div class="modal-content">
                      <p class="close">&times;</p>
                      <p id="mensagemModal"></p>
                  </div>
              </div>
          </div>
  
      </main>
    <script src="/Mixins/topbar.js"></script>
    <script src="/Mixins/sidebar.js"></script>
    <script src="/js/Auth/scriptinicio.js"></script>
    <script src="/js/Compras/A_CadastrarCompras.js"></script>
      <script src="/js/Perfil/A_Perfil.js"></script>
      <script src="/js/Notificacao/A_Notificacao.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</body>
</html>
