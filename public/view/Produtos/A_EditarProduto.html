!<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Editar Produto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
      <div id="topbar-container"></div>

        <div id="sidebar-container"></div>

      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr> 
        <h2><i class="fa-solid fa-plus"></i class="texto-produto">Cadastrar Itens</h2>
        <p class="texto-produto">Cadastre Produtos para Compra Aqui.</p>
        <p class="texto-produto">Após Cadastrar os itens eles estarão no Compras.</p>

        <h2>Editar Produto</h2>
      
    <div class="card-container">
        <div class="form-card">
        <form id="produto-form">
            <div class="form-row">
            <div class="form-field">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required />
            </div>
            <div class="form-field">
                <label for="codigoBarras">Código de Barras:</label>
                <input type="number" id="codigoBarras" name="codigoBarras" required />
            </div>
            </div>

            <div class="form-row">
            <div class="form-field">
                <label for="vencimento">Data de Vencimento:</label>
                <input type="date" id="vencimento" name="vencimento" required />
            </div>
            <div class="form-field">
                <label for="quantidade">Quantidade:</label>
                <input type="number" id="quantidade" name="quantidade" required />
            </div>
            </div>

            <div class="form-row">
            <div class="form-field">
                <label for="fornecedor">Fornecedor:</label>
                <input type="text" id="fornecedor" name="fornecedor" required />
            </div>
            <div class="form-field">
                <label for="categoria">Categoria:</label>
                <input type="text" id="categoria" name="categoria" required />
            </div>
            </div>

            <div class="button-container">
            <button type="submit" class="button">Salvar Alterações</button>
            </div>
        </form>
        </div>
    </div>

              <!-- Modal -->
            <div id="modalExclusao" class="modal">
                <div class="modal-content">
                    <p class="close">&times;</p>
                    <p id="mensagemModal"></p>
                </div>
            </div>
          </div>
  
      </main>
    <script src="/Mixins/topbar.js"></script>
    <script src="/Mixins/sidebar.js"></script>
    <script src="/js/Auth/scriptinicio.js"></script>
    <script src="/js/Produtos/A_EditarProduto.js"></script>
     <script src="/js/Notificacao/A_Notificacao.js"></script>
     <script src="/js/Perfil/A_Perfil.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</body>
</html>
