!<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Editar Fornecedor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
      <header class="top-bar">
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <h1 style="letter-spacing: 5px;">AGILITY</h1>
        <div class="placeholder"></div>
           <div class="top-bar-right">
            <!-- Notificações -->
            <div class="notification-icon" id="notificacao-btn" style="cursor: pointer;">
                <span class="bell">🔔</span>
                <span class="notification-badge" id="notificacao-contador" style="display: none;">0</span>
            </div>

            <!-- Área do usuário -->
                <div class="user-info">
                  <img id="avatarUsuario" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Usuário" class="user-avatar">
                  <span class="user-name">Olá, Usuário</span>
                </div>
          </div> 
      </header>

        <div id="sidebar-container"></div>

      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr> 
        <h2><i class="fa-solid fa-plus"></i class="texto-produto">Editar Fornecedor</h2>
      
        <div class="card-container">
        <div class="form-card">
            <form id="editar-fornecedor-form">
            <h3>Dados do Fornecedor</h3>

            <div class="form-row">
                <div class="form-field">
                <label for="nomeEstabelecimento">Nome:</label>
                <input type="text" id="nomeEstabelecimento" name="nomeEstabelecimento" required />
                </div>
                <div class="form-field">
                <label for="cnpj">CNPJ:</label>
                <input type="text" id="cnpj" name="cnpj" required />
                </div>
            </div>

            <div class="form-row">
                <div class="form-field">
                <label for="contato">Contato:</label>
                <input type="text" id="contato" name="contato" required />
                </div>
            </div>

            <h3>Dados da Unidade</h3>

            <div class="form-row">
                <div class="form-field">
                <label for="logradouro">Logradouro:</label>
                <input type="text" id="logradouro" name="logradouro" required />
                </div>
                <div class="form-field">
                <label for="numero">Número:</label>
                <input type="text" id="numero" name="numero" required />
                </div>
            </div>

            <div class="form-row">
                <div class="form-field">
                <label for="bairro">Bairro:</label>
                <input type="text" id="bairro" name="bairro" required />
                </div>
                <div class="form-field">
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" name="cidade" required />
                </div>
            </div>

            <div class="form-row">
                <div class="form-field">
                <label for="cep">CEP:</label>
                <input type="text" id="cep" name="cep" required />
                </div>
            </div>

            <div class="button-container">
                <button type="submit" class="button">Salvar Alterações</button>
            </div>
            </form>
        </div>
        </div>

              <!-- Modal -->
            <div id="modalExclusao" class="modal">
                <div class="modal-content">
                    <p class="close">&times;</p>
                    <p id="mensagemModal"></p>
                </div>
            </div>
          </div>
  
      </main>
    <script src="/Mixins/sidebar.js"></script>
    <script src="/js/Auth/scriptinicio.js"></script>
    <script src="/js/Fornecedores/A_EditarFornecedor.js"></script>
     <script src="/js/Notificacao/A_Notificacao.js"></script>
      <script src="/js/Perfil/A_Perfil.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</body>
</html>
