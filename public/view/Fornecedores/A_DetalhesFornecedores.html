<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Detalhes Fornecedor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
      <header class="top-bar">
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <h1 style="letter-spacing: 5px;">AGILITY</h1>
        <div class="placeholder"></div>
           <div class="top-bar-right">
            <!-- Notificações -->
            <div class="notification-icon" id="notificacao-btn" style="cursor: pointer;">
                <span class="bell">🔔</span>
                <span class="notification-badge" id="notificacao-contador" style="display: none;">0</span>
            </div>

            <!-- Área do usuário -->
            <div class="user-info">
              <img id="avatarUsuario" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Usuário" class="user-avatar">
              <span class="user-name">Olá, Usuário</span>
            </div>
          </div> 
      </header>

          <div id="sidebar-container"></div>


    <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr>
         <h2>Detalhe do Fornecedor</h2>
    <div class="container-detalhes">
        <div class="detalhes">
            <strong>Nome:</strong> <span id="nome"></span>
        </div>
        <div class="detalhes">
            <strong>CNPJ:</strong> <span id="cnpj"></span>
        </div>
        <div class="detalhes">
            <strong>Contato:</strong> <span id="contato"></span>
        </div>
        <div class="detalhes">
            <strong>Logradouro:</strong> <span id="logradouro"></span>
        </div>
        <div class="detalhes">
            <strong>Número:</strong> <span id="numero"></span>
        </div>
        <div class="detalhes">
            <strong>Bairro:</strong> <span id="bairro"></span>
        </div>
        <div class="detalhes">
            <strong>Cidade:</strong> <span id="cidade"></span>
        </div>
        <div class="detalhes">
            <strong>CEP:</strong> <span id="cep"></span>
        </div>

        <div class="botoes-acoes" style="margin-top: 20px;">
            <button id="btn-voltar" style="margin-right: 10px;">Voltar para Lista</button>
            <button id="btn-editar">Editar Fornecedor</button>
        </div>
    </div>
    </main>

    <!-- Modal -->
    <div id="modalExclusao" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="mensagemModal"></p>
        </div>
    </div>
</body>
    <script src="/Mixins/sidebar.js"></script>
    <script src="/js/Auth/scriptinicio.js"></script>
    <script src="/js/Fornecedores/A_DetalheFornecedor.js"></script>
     <script src="/js/Notificacao/A_Notificacao.js"></script>
      <script src="/js/Perfil/A_Perfil.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</html>
