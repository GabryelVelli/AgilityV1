<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agility - Cadastrar Fornecedor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
      <div id="topbar-container"></div>

          <div id="sidebar-container"></div>


      <main class="main-content">
        <h1 class="titulo"><i class="fa-solid fa-triangle-exclamation"></i>AGILITY</h1>
        <hr>
        <h2><i class="fa-solid fa-shop"></i>Fornecedor</h2>
        <p class="texto-produto">Cadastre seu Fornecedor e sua unidade nesta seção</p>
        <div class="card-container">
        <div class="form-card">
          <form id="estabelecimentoForm">
            <h3>Dados do Fornecedor</h3>
            <br>
            <div class="form-row">
              <div class="form-field">
                <label for="nomeEstabelecimento">Fornecedor</label>
                <input type="text" id="nomeEstabelecimento" name="nomeEstabelecimento" placeholder="Digite o nome do Fornecedor" required />
              </div>
              <div class="form-field">
                <label for="cnpj">CNPJ</label>
                <input type="text" id="cnpj" name="cnpj" placeholder="Digite o CNPJ" required maxlength="18"/>
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <label for="contato">Contato</label>
                <input type="text" id="contato" name="contato" placeholder="Digite o contato do fornecedor" required />
              </div>
            </div>

            <h3>Dados da Unidade</h3>
            <br>
            <div class="form-row">
              <div class="form-field">
                <label for="logradouro">Logradouro</label>
                <input type="text" id="logradouro" name="logradouro" placeholder="Digite o logradouro" required />
              </div>
              <div class="form-field">
                <label for="numero">Número</label>
                <input type="text" id="numero" name="numero" placeholder="Digite o número" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" name="bairro" placeholder="Digite o bairro" required />
              </div>
              <div class="form-field">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" name="cidade" placeholder="Digite a cidade" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <label for="cep">CEP</label>
                <input type="text" id="cep" name="cep" placeholder="Digite o CEP" required />
              </div>
            </div>

            <div class="button-container">
              <button type="submit" class="button">Cadastrar</button>
            </div>
          </form>
        </div>
      </div>
     <!-- Modal -->
     <div id="modalExclusao" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="mensagemModal"></p>
        </div>
    </div>
    </main>
</body>

<script src="/js/Fornecedores/A_Fornecedor.js"></script>
<script src="/Mixins/topbar.js"></script>
    <script src="/Mixins/sidebar.js"></script>
    <script src="/js/Auth/scriptinicio.js"></script>
<script src="/js/Notificacao/A_Notificacao.js"></script>
 <script src="/js/Perfil/A_Perfil.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          atualizarContadorNotificacoes();
        });
      </script>
</html>
